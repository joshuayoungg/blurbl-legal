<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Email Confirmed</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #f7f7f8;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      color: #1a1a1a;
    }
    .card {
      background: #ffffff;
      padding: 40px 32px;
      border-radius: 24px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
      max-width: 320px;
    }
    .icon {
      font-size: 48px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 24px;
      margin: 0 0 12px 0;
    }
    p {
      font-size: 15px;
      color: #666;
      line-height: 1.5;
      margin: 0 0 24px 0;
    }
    .btn {
      display: inline-block;
      background-color: #000;
      color: #fff;
      text-decoration: none;
      padding: 14px 24px;
      border-radius: 12px;
      font-weight: 600;
      font-size: 16px;
      width: 100%;
      box-sizing: border-box;
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>Email Confirmed!</h1>
    <p>Your account is verified and ready to go. You can safely close this page or return to the app.</p>
  </div>

  <script>
    // 1. Grab the exact hash Supabase attached to the URL (e.g., #access_token=...)
    const hash = window.location.hash;
    
    // 2. Construct the deep link to your mobile app
    const appDeepLink = "myorbis://login" + hash;

    // 3. Update the fallback button just in case
    document.getElementById("open-app-btn").href = appDeepLink;

    // 4. Automatically attempt to redirect the browser into the mobile app
    window.onload = function() {
      setTimeout(() => {
        window.location.href = appDeepLink;
      }, 500); // slight delay so the user actually sees the success message
    };
  </script>
</body>
</html>
